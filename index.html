<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walkthrough 360</title>

  <link rel="stylesheet" href="pannellum/pannellum.css" />

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #panorama {
      width: 100vw;
      height: 100vh;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      box-sizing: border-box;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .topbar button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 8px 14px;
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      cursor: pointer;
      font-size: 13px;
    }

    .topbar button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .bottombar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      transform: translateX(-50%);
      padding: 10px 16px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 999px;
      font-size: 14px;
      text-align: center;
      backdrop-filter: blur(6px);
    }
  </style>
</head>

    <div class="topbar-actions">
      <button id="homeButton" type="button">Inicio</button>
      <button id="fullscreenButton" type="button">Pantalla completa</button>

  </div>

  <div id="panorama"></div>

    document.getElementById('fullscreenButton').addEventListener('click', function () {
      const element = document.documentElement;

      if (element.requestFullscreen) {
        element.requestFullscreen();
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      } else if (element.msRequestFullscreen) {
        element.msRequestFullscreen();
      }

</html>
